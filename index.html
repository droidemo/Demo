<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Каталог фото конспекта</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d7dde5;
      --accent: #0f766e;
      --accent-soft: #d9f4ef;
      --tag: #eef2f6;
      --tag-hit: #fff1b8;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(244, 246, 248, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .bar {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px 18px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .counter {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .search {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 18px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
      background: #fff;
      color: var(--ink);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button {
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 16px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-size: 15px;
    }

    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px;
    }

    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .quick-tags button {
      height: 34px;
      padding: 0 11px;
      border-color: transparent;
      background: var(--accent-soft);
      color: #064e46;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .photo-link {
      display: block;
      background: #e8edf3;
    }

    img {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
    }

    .body {
      padding: 12px;
    }

    .name {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      border-radius: 999px;
      background: var(--tag);
      padding: 4px 9px;
      color: #344054;
      font-size: 12px;
      line-height: 1.2;
    }

    .tag.hit {
      background: var(--tag-hit);
      color: #693b00;
    }

    .empty {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 28px;
      color: var(--muted);
      text-align: center;
      background: #fff;
    }

    @media (max-width: 700px) {
      .bar,
      .search {
        grid-template-columns: 1fr;
      }

      .counter {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>Каталог фото конспекта</h1>
        <p class="hint">Пиши тему или тег: например, “вольт-амперная”, “диод”, “транзистор”, “триггер”.</p>
      </div>
      <div class="counter" id="counter"></div>
    </div>
    <div class="search">
      <input id="query" type="search" placeholder="Поиск по тегам и названию фото" autocomplete="off">
      <button id="clear" type="button">Очистить</button>
    </div>
  </header>

  <main>
    <div class="quick-tags" id="quickTags"></div>
    <div class="empty" id="empty">Ничего не найдено. Попробуй другое слово или более общий тег.</div>
    <section class="grid" id="grid"></section>
  </main>

  <script>
    const folder = "Photo_ex/";
    const stamp = "2026-07-06_22-38-19";

    const baseTags = ["электроника", "конспект"];
    const photos = [
      p(1, ["элементы схем", "резистор", "конденсатор", "катушка индуктивности", "трансформатор", "условные обозначения"]),
      p(2, ["полупроводники", "диод", "p-n переход", "переход", "обозначения"]),
      p(3, ["диод", "p-n переход", "выпрямитель", "схема", "ВАХ"]),
      p(4, ["выпрямитель", "диодный мост", "сглаживающий фильтр", "схема питания"]),
      p(5, ["диод", "классификация диодов", "параметры диодов", "полупроводниковые приборы"]),
      p(6, ["диод", "выпрямительный диод", "стабилитрон", "условные обозначения"]),
      p(7, ["полупроводниковый диод", "прямое включение", "обратное включение", "теория"]),
      p(8, ["диод", "переход", "выпрямление", "схемы"]),
      p(9, ["выпрямитель", "схема выпрямителя", "фильтр", "конденсатор"]),
      p(10, ["диод", "полупроводниковые приборы", "переход", "характеристики"]),
      p(11, ["диоды", "стабилитрон", "стабилизация напряжения", "характеристики"]),
      p(12, ["стабилитрон", "схема стабилизации", "ВАХ стабилитрона", "обратный пробой"]),
      p(13, ["диод", "параметры диодов", "прямой ток", "обратный ток", "статическое сопротивление"]),
      p(14, ["вольт-амперная характеристика диода", "ВАХ диода", "германиевый диод", "кремниевый диод", "Ge", "Si", "прямой ток", "обратный ток"]),
      p(15, ["основные параметры диодов", "Uпр max", "Iпр max", "обратный ток", "мощность"]),
      p(16, ["варикап", "вольт-амперная характеристика", "емкость варикапа", "диод Шоттки", "барьерная емкость"]),
      p(17, ["диод Шоттки", "контакт металл полупроводник", "быстродействие", "диоды"]),
      p(18, ["биполярный транзистор", "структура транзистора", "эмиттер", "база", "коллектор"]),
      p(19, ["биполярный транзистор", "принцип работы БТ", "эмиттер", "база", "коллектор", "ток коллектора"]),
      p(20, ["транзистор", "коэффициент передачи", "токи транзистора", "параметры БТ"]),
      p(21, ["транзистор", "схема включения", "общий эмиттер", "характеристики"]),
      p(22, ["транзистор", "выходные характеристики", "входные характеристики", "графики"]),
      p(23, ["транзистор", "статические характеристики", "график", "режимы работы"]),
      p(24, ["транзистор", "схема с общим эмиттером", "усилитель", "характеристики"]),
      p(25, ["транзистор", "схема включения", "общая база", "общий коллектор"]),
      p(26, ["полевой транзистор", "канал", "затвор", "исток", "сток"]),
      p(27, ["полевой транзистор", "ВАХ", "стоковые характеристики", "затвор"]),
      p(28, ["полевой транзистор", "схема", "переход", "управление током"]),
      p(29, ["транзистор", "усилительный каскад", "режимы", "схема"]),
      p(30, ["транзистор", "полевой транзистор", "условные обозначения", "схемы"]),
      p(31, ["усилители", "транзисторный усилитель", "коэффициент усиления", "сигнал"]),
      p(32, ["усилитель", "схема усилителя", "нагрузочная прямая", "рабочая точка"]),
      p(33, ["усилительный каскад", "схема", "резисторы", "конденсаторы"]),
      p(34, ["режим работы транзистора", "таблица", "ключевой режим", "активный режим"]),
      p(35, ["схема усилителя", "транзистор", "цепи смещения", "конденсатор"]),
      p(36, ["усилитель", "графики", "нагрузочная прямая", "амплитуда сигнала"]),
      p(37, ["усилители", "параметры усилителя", "коэффициент усиления", "частота"]),
      p(38, ["обратная связь", "усилитель", "ООС", "параметры"]),
      p(39, ["усилитель", "частотная характеристика", "АЧХ", "график"]),
      p(40, ["усилитель", "характеристики", "искажения", "сигнал"]),
      p(41, ["операционный усилитель", "ОУ", "схема", "входы", "выход"]),
      p(42, ["операционный усилитель", "инвертирующий усилитель", "неинвертирующий усилитель"]),
      p(43, ["операционный усилитель", "параметры ОУ", "коэффициент усиления", "входное сопротивление"]),
      p(44, ["компаратор", "операционный усилитель", "схема сравнения", "порог"]),
      p(45, ["операционный усилитель", "сумматор", "интегратор", "дифференциатор"]),
      p(46, ["сигналы", "графики сигналов", "импульсы", "форма сигнала"]),
      p(47, ["логические элементы", "цифровая электроника", "И", "ИЛИ", "НЕ", "схемы"]),
      p(48, ["логические элементы", "таблица истинности", "цифровые схемы", "вентили"]),
      p(49, ["цифровая электроника", "логические функции", "таблица", "схемы"]),
      p(50, ["логические элементы", "триггер", "RS триггер", "схема"]),
      p(51, ["триггер", "RS триггер", "таблица истинности", "состояния"]),
      p(52, ["триггер", "D триггер", "временная диаграмма", "синхронизация", "сигнал"]),
      p(53, ["триггер", "JK триггер", "схема", "цифровые устройства"]),
      p(54, ["регистры", "триггеры", "цифровые устройства", "память"]),
      p(55, ["счетчики", "триггеры", "последовательностные схемы", "цифровая электроника"]),
      p(56, ["счетчик", "двоичный счетчик", "триггеры", "таблица состояний"]),
      p(57, ["микросхемы", "цифровые устройства", "интегральные схемы", "логика"]),
      p(58, ["микросхемы", "классификация микросхем", "цифровая техника", "параметры"]),
      p(59, ["электронные устройства", "цифровая техника", "конспект", "теория"]),
      p(60, ["микропроцессор", "микроконтроллер", "цифровая система", "блок схема"]),
      p(61, ["К155", "К561", "маркировка микросхем", "серии микросхем"]),
      p(62, ["микросхемы", "корпус", "выводы", "условное обозначение"]),
      p(63, ["цифровая схема", "элементы логики", "соединения", "схема"]),
      p(64, ["цифровая схема", "логические элементы", "триггеры", "схема"]),
      p(65, ["цифровая схема", "логика", "таблица", "схема"]),
      p(66, ["схема", "логические элементы", "цифровое устройство", "входы выходы"]),
      p(67, ["аналоговые устройства", "электроника", "параметры", "теория"]),
      p(68, ["схема", "электронный узел", "диоды", "транзисторы"]),
      p(69, ["цифровая схема", "блок схема", "логический узел", "элементы"]),
      p(70, ["цифровые устройства", "схема", "логика", "таблица"]),
      p(71, ["микропроцессорная техника", "память", "шина", "система"]),
      p(72, ["блок схема", "микропроцессор", "структура", "устройство"]),
      p(73, ["цифровая схема", "схема соединений", "микросхема", "выводы"]),
      p(74, ["цифровая электроника", "схема", "триггеры", "логика"]),
      p(75, ["регистр", "счетчик", "схема", "последовательностная логика"]),
      p(76, ["цифровая техника", "схема", "таблица", "конспект"]),
      p(77, ["схема", "логические элементы", "цифровой автомат", "таблица"]),
      p(78, ["регистр сдвига", "триггеры", "схема", "последовательное соединение"]),
      p(79, ["цифровая схема", "таблица", "логические элементы", "формулы"]),
      p(80, ["график", "диаграмма", "цифровой сигнал", "временная диаграмма"]),
      p(81, ["логические элементы", "схема", "цифровая электроника", "итоговый конспект"])
    ];

    const popular = [
      "вольт-амперная характеристика диода",
      "диод",
      "варикап",
      "стабилитрон",
      "транзистор",
      "усилитель",
      "операционный усилитель",
      "логические элементы",
      "триггер",
      "микросхемы"
    ];

    const grid = document.getElementById("grid");
    const query = document.getElementById("query");
    const clear = document.getElementById("clear");
    const counter = document.getElementById("counter");
    const empty = document.getElementById("empty");
    const quickTags = document.getElementById("quickTags");

    function p(number, tags) {
      const name = `photo_${number}_${stamp}.jpg`;
      return {
        number,
        name,
        src: folder + name,
        tags: [...baseTags, ...tags]
      };
    }

    function normalize(text) {
      return text.toLowerCase().replace(/ё/g, "е").trim();
    }

    function render() {
      const raw = query.value;
      const q = normalize(raw);
      const words = q.split(/\s+/).filter(Boolean);
      const result = photos.filter(photo => {
        if (!words.length) return true;
        const haystack = normalize([photo.name, ...photo.tags].join(" "));
        return words.every(word => haystack.includes(word));
      });

      grid.innerHTML = "";
      empty.style.display = result.length ? "none" : "block";
      counter.textContent = `Показано ${result.length} из ${photos.length}`;

      for (const photo of result) {
        const article = document.createElement("article");
        article.className = "card";

        const link = document.createElement("a");
        link.className = "photo-link";
        link.href = photo.src;
        link.target = "_blank";

        const img = document.createElement("img");
        img.src = photo.src;
        img.alt = photo.tags.join(", ");
        img.loading = "lazy";
        link.appendChild(img);

        const body = document.createElement("div");
        body.className = "body";

        const name = document.createElement("p");
        name.className = "name";
        name.textContent = photo.name;

        const tags = document.createElement("div");
        tags.className = "tags";

        for (const tagText of photo.tags) {
          const tag = document.createElement("span");
          tag.className = "tag";
          if (q && normalize(tagText).includes(q)) tag.classList.add("hit");
          tag.textContent = "#" + tagText;
          tags.appendChild(tag);
        }

        body.appendChild(name);
        body.appendChild(tags);
        article.appendChild(link);
        article.appendChild(body);
        grid.appendChild(article);
      }
    }

    for (const tag of popular) {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = "#" + tag;
      button.addEventListener("click", () => {
        query.value = tag;
        render();
        query.focus();
      });
      quickTags.appendChild(button);
    }

    query.addEventListener("input", render);
    clear.addEventListener("click", () => {
      query.value = "";
      render();
      query.focus();
    });

    render();
  </script>
</body>
</html>
