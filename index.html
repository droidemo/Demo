<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ascheleo постарался (feat.eleg4n7)  </title>
  <style>
    :root {
      --bg: #eef3f7;
      --card: #fff;
      --text: #142033;
      --muted: #667085;
      --line: #d8e1ea;
      --accent: #0f766e;
      --accent2: #14b8a6;
      --soft: #e6fffb;
      --warn: #fff7d6;
      --shadow: 0 8px 24px rgba(16,24,40,.08);
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbfd 0%, var(--bg) 100%);
      color: var(--text);
      overflow: hidden;
      height: 100dvh;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid rgba(216,225,234,.9);
      background: rgba(248,251,253,.95);
      backdrop-filter: blur(12px);
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top));
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -.02em;
    }

    .hint { display: none; }

    .counter {
      flex: 0 0 auto;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-box {
      position: relative;
      flex: 1;
    }

    .search-box svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      width: 16px;
      height: 16px;
    }

    input {
      width: 100%;
      height: 42px;
      padding: 0 10px 0 36px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 16px; /* 16px чтобы iOS не зумил */
      outline: none;
    }

    input:focus { border-color: var(--accent2); }

    button { border: 0; font: inherit; cursor: pointer; }

    .clear-btn {
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      white-space: nowrap;
    }

    /* MAIN */
    main {
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: calc(100dvh - 120px);
      overflow: hidden;
    }

    /* ФИЛЬТРЫ — горизонтальный скролл */
    .filters {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
      flex-shrink: 0;
    }
    .filters::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      font-size: 13px;
      white-space: nowrap;
    }
    .chip.active {
      border-color: rgba(15,118,110,.4);
      background: var(--soft);
      color: #075e57;
      font-weight: 600;
    }

    /* СПИСОК */
    .list {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.95);
      box-shadow: var(--shadow);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .item {
      width: 100%;
      display: block;
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      transition: background .1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .item:last-child { border-bottom: 0; }
    .item:active { background: #f0fffc; }

    .item-head {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-weight: 700;
      font-size: 15px;
      line-height: 1.35;
    }

    .num {
      flex: 0 0 auto;
      min-width: 36px;
      color: var(--accent);
      font-size: 14px;
      padding-top: 1px;
    }

    .item-meta {
      margin: 4px 0 0 44px;
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      display: none;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    mark {
      background: #c6fff3;
      color: inherit;
      border-radius: 4px;
      padding: 0 2px;
    }

    /* ===== МОДАЛКА — СНИЗУ (sheet) ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.5);
      z-index: 1000;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-window {
      background: #fff;
      width: 100%;
      max-height: 92dvh;
      border-radius: 20px 20px 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: var(--safe-bottom);
      animation: slideUp .25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Drag handle */
    .modal-handle {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      padding: 10px 0 4px;
    }
    .modal-handle span {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: #d1d5db;
    }

    .modal-header {
      padding: 4px 16px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex: 0 0 auto;
    }

    .modal-title-group h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
    }
    .modal-title-group p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f1f5f9;
      border: none;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 16px;
    }

    /* Фото — 1 колонка на телефоне */
    .photo-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .photo-card {
      min-height: 180px;
      border: 1px dashed #b8c4d1;
      border-radius: 14px;
      background: #f5f8fb;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--muted);
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    .photo-card.has-photo {
      border-style: solid;
      min-height: 200px;
      cursor: zoom-in;
    }
    .photo-card img {
      width: 100%;
      height: auto;
      max-height: 60dvh;
      object-fit: contain;
      display: block;
      background: #f5f8fb;
    }

    .photo-empty-msg { padding: 14px; font-size: 13px; }
    .photo-error-msg { display: none; padding: 14px; font-size: 13px; }

    .section-title {
      margin: 20px 0 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 800;
    }
    .section-title:first-child { margin-top: 0; }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 9px;
      border-radius: 999px;
      background: #edf2f7;
      color: #344054;
      font-size: 12px;
    }

    .answer {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fbfdff;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 15px;
    }
    .answer.placeholder {
      border-style: dashed;
      color: var(--muted);
      background: #f8fafc;
    }

    .note {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: var(--warn);
      color: #694100;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>

  Q(23,"Назовите дифференциальные параметры полевых транзисторов и поясните методику их определения.","Параметры ПТ","полевой транзистор|крутизна|внутреннее сопротивление|дифференциальные параметры",`23 Дифференциальные параметры полевого транзистора показывают, как он реагирует на маленькое изменение входного сигнала в рабочей точке.\n\nS (крутизна) — на сколько изменится ток стока, если чуть-чуть изменить напряжение на затворе. Чем больше S, тем сильнее транзистор усиливает. Определяют по наклону кривой зависимости тока стока от напряжения затвора.\n\nRi (внутреннее сопротивление стока) — на сколько изменится ток стока, если чуть-чуть изменить напряжение на стоке. Чем больше Ri, тем меньше ток зависит от напряжения стока. Определяют по наклону кривой зависимости тока стока от напряжения стока.\n\nμ (коэффициент усиления) — общая способность транзистора усиливать напряжение. Равен произведению S и Ri.`,[``,``,``]),
  Q(24,"Опишите принцип работы полевых транзисторов с индуцированным и встроенным каналом.","МОП-транзисторы","полевой транзистор|МОП|индуцированный канал|встроенный канал",`24 Полевой транзистор управляет током электричества через канал, не требуя тока на управляющем электроде (затворе).\n\nС встроенным каналом\nМежду стоком и истоком уже есть готовый проводящий канал. Напряжение на затворе сужает или расширяет этот канал.\nПри нуле на затворе — ток максимальный, канал открыт.\nЧем больше напряжение затвор–исток — тем уже канал, тем меньше ток.\nПри достаточном напряжении канал перекрывается полностью, ток обрывается.\n\nС индуцированным каналом\nМежду стоком и истоком изначально нет канала — полупроводник непроводящий. Напряжение на затворе создаёт канал.\nПри нуле на затворе — тока нет, транзистор закрыт.\nПри достаточном напряжении затвор–исток под затвором возникает проводящий канал.\nЧем больше напряжение — тем шире канал, тем больше ток.`,[``,``,``]),
  Q(25,"Опишите назначение, устройство, принцип действия тиристоров. Начертите их условные графические обозначения.","Тиристоры","тиристор|тиристоры|управляемый прибор|обозначения",`25 Назначение тринисторов:\n1. Управление мощностью — регулировка яркости света, оборотов двигателей, мощности нагревателей\n2. Выпрямление с регулировкой — зарядные устройства, сварочные аппараты\n3. Бесконтактная коммутация — твердотельные реле, защитные отключения`,[`25.jpg`,`251.jpg`,`252.jpg`]),
  Q(26,"Опишите основные параметры и характеристики тиристоров.","Параметры тиристоров","тиристор|тиристоры|параметры|характеристики",`26 Основные параметры тиристоров:\nМаксимальный ток Iпр: Предельный ток в открытом состоянии.\nМаксимальное напряжение Uобр / Uзс: Предел напряжения до пробоя.\nТок отпирания Igt: Импульс тока для включения.\nТок удержания Ih: Минимум тока для сохранения открытого состояния.\nПадение напряжения Vf: Потеря напряжения на открытом тиристоре (1–2 В).\nКритические скорости du/dt, di/dt: Пределы скорости роста напряжения и тока во избежание поломки или ложного включения.`,[`26.jpg`,``,``]),
  Q(27,"Опишите устройство, назначение, принцип действия, ВАХ фоторезисторов.","Фоторезистор","фоторезистор|ВАХ|свет|фотоэлектрический прибор",`ВСТАВЬ СЮДА ТЕКСТ ОТВЕТА ДЛЯ ВОПРОСА 27`,[`27.jpg`,``,``]),
  Q(28,"Опишите устройство, назначение, принцип действия, ВАХ фотодиодов.","Фотодиод","фотодиод|ВАХ|фототок|свет",`ВСТАВЬ СЮДА ТЕКСТ ОТВЕТА ДЛЯ ВОПРОСА 28`,[`28.jpg`,``,``]),
  Q(29,"Опишите устройство, назначение, принцип действия светодиодов, оптронов.","Светодиоды и оптроны","светодиод|светодиоды|оптрон|оптроны",`29 Светодиод (LED)\nНазначение: Преобразование электрического тока в свет.\nУстройство: Полупроводниковый кристалл из двух слоев с разным типом проводимости (p- и n-переход), помещенный в прозрачный корпус с двумя выводами (анод и катод).\nПринцип действия: При протекании тока в прямом направлении электроны переходят из одного слоя в другой. При переходе выделяется энергия в виде света (фотонов). Цвет свечения зависит от материала кристалла.\n\nОптрон (оптопара)\nНазначение: Передача электрического сигнала между частями схемы без их прямого контакта (гальваническая развязка).\nУстройство: В одном закрытом корпусе объединены излучатель (светодиод) и приемник света (фотодиод, фототранзистор).\nПринцип действия: Сигнал на входе заставляет светодиод светиться. Свет падает на фотоприемник, который активируется и открывает ток в выходной цепи.`,[`29.jpg`,``,``]),
  Q(30,"Дайте определение понятию «цифровые интегральные микросхемы». Поясните, чем отличаются аналоговые и цифровые ИМС. Дайте определение понятию «степень интеграции». Поясните маркировку ИМС.","Интегральные микросхемы","ИМС|цифровые микросхемы|аналоговые микросхемы|степень интеграции|маркировка",`ВСТАВЬ СЮДА ТЕКСТ ОТВЕТА ДЛЯ ВОПРОСА 30`,[`30.jpg`,`31.jpg`,`32.jpg`]),
  Q(31,"Опишите способы создания полупроводниковых, пленочных и гибридных ИМС.","Технологии ИМС","ИМС|полупроводниковые ИМС|пленочные ИМС|гибридные ИМС",`31 1. Полупроводниковые ИМС\nВсе элементы создаются внутри одного кристалла кремния. Через фотошаблоны в кремний внедряют примеси, формируя транзисторы и диоды, а сверху напыляют металл для соединений.\n\n2. Пленочные ИМС\nНа стеклянную или керамическую плату наносят слои материалов.\nТонкопленочный: Напыление в вакууме — точные мелкие элементы.\nТолстопленочный: Нанесение паст через трафарет с запеканием — дешевле и грубее.\n\n3. Гибридные ИМС\nНа керамической плате пленочным методом создают резисторы и дорожки. Затем припаивают готовые транзисторы, диоды или чипы и закрывают в общий корпус.`,[``,``,``]),
  Q(32,"Опишите конструкцию, принцип действия, достоинства и недостатки газоразрядных индикаторов, полупроводниковых и жидкокристаллических индикаторов.","Индикаторы","индикаторы|газоразрядные индикаторы|полупроводниковые индикаторы|жидкокристаллические индикаторы|LCD|LED",`32 Газоразрядные\nКолба с газом, электроды-цифры. Ионизация газа при высоком напряжении — свечение.\n+ Контрастные, широкий угол, долговечны.\n− Высокое напряжение, хрупкие, большие.\n\nПолупроводниковые\nСветодиоды, семь сегментов. Излучение при токе через p-n-переход.\n+ Низкое напряжение, малые, яркие, быстрые.\n− Узкий угол яркости, перегрев.\n\nЖидкокристаллические\nПластины с ЖК-слоем, поляризаторы, подсветка. Напряжение меняет ориентацию молекул.\n+ Минимальное энергопотребление, тонкие, дешёвые.\n− Нужна подсветка, ограниченный угол, инерционность.`,[``,``,``]),

  Q(35,"Назовите виды обратных связей. Поясните как влияют обратные связи на параметры усилителя.","Обратная связь","обратная связь|ООС|ПОС|усилитель",`35 Обратная связь — передача части выходного сигнала обратно на вход.\n\nОтрицательная (ООС): сигнал на входе уменьшается — снижает усиление, стабилизирует, убирает искажения.\nПоложительная (ПОС): сигнал на входе увеличивается — вызывает автоколебания, применяется в генераторах.\n\nСпособы подключения:\nПо напряжению: снимается параллельно нагрузке.\nПо току: снимается последовательно с нагрузкой.\nПоследовательная: вводится последовательно со входом, повышает входное сопротивление.\nПараллельная: вводится параллельно входу, снижает входное сопротивление.\n\nПо типу сигнала:\nПо постоянному току: стабилизирует режим при нагреве.\nПо переменному току: задает коэффициент усиления и частоту.`,[`35.jpg`,``,``]),

/* ---- STATE ---- */
const state = { mode: "all" };

/* ---- ELEMENTS ---- */
const listEl    = document.getElementById("list");
const queryEl   = document.getElementById("query");
const clearEl   = document.getElementById("clear");
const counterEl = document.getElementById("counter");
const emptyEl   = document.getElementById("empty");
const filtersEl = document.getElementById("filters");
const modalOverlay  = document.getElementById("modalOverlay");
const modalTitle    = document.getElementById("modalTitle");
const modalSubtitle = document.getElementById("modalSubtitle");
const modalContent  = document.getElementById("modalContent");
const closeModalBtn = document.getElementById("closeModalBtn");

/* ---- FILTERS ---- */
const popularFilters = [
  { label:"Все", mode:"all" },
  { label:"Вопросы", mode:"questions" },
  { label:"Задачи", mode:"tasks" },
  { label:"#диод", query:"диод" },
  { label:"#транзистор", query:"транзистор" },
  { label:"#h-параметры", query:"h-параметры" },
  { label:"#усилитель", query:"усилитель" },
  { label:"#ОУ", query:"ОУ" },
  { label:"#выпрямитель", query:"выпрямитель" },
  { label:"#мультивибратор", query:"мультивибратор" },
];

/* ---- HELPERS ---- */
function normalize(t) {
  return String(t||"").toLowerCase().replace(/ё/g,"е")
    .replace(/[|/\\.,;:!?()[\]{}"'«»<>+=_*~`^№%$#@&—–-]/g," ")
    .replace(/\s+/g," ").trim();
}
function enToRu(t) {
  const m={q:"й",w:"ц",e:"у",r:"к",t:"е",y:"н",u:"г",i:"ш",o:"щ",p:"з","[":"х","]":"ъ",a:"ф",s:"ы",d:"в",f:"а",g:"п",h:"р",j:"о",k:"л",l:"д",";":"ж","'":"э",z:"я",x:"ч",c:"с",v:"м",b:"и",n:"т",m:"ь",",":"б",".":"ю"};
  return String(t).split("").map(c=>m[c]||c).join("");
}
function simpleTranslit(t) {
  const m={a:"а",b:"б",v:"в",g:"г",d:"д",e:"е",z:"з",i:"и",j:"й",k:"к",l:"л",m:"м",n:"н",o:"о",p:"п",r:"р",s:"с",t:"т",u:"у",f:"ф",h:"х",c:"ц",y:"ы"};
  return String(t).split("").map(c=>m[c]||c).join("");
}
function escHtml(t) {
  return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function escAttr(t) { return escHtml(t).replace(/`/g,"&#096;"); }

/* ---- SEARCH ---- */
function buildIndex() {
  for (const item of catalog) {
    const sn = item.kind==="Вопрос"
      ? `вопрос ${item.number} q${item.number}`
      : `задача ${item.number} з${item.number} t${item.number}`;
    item._s = normalize([sn,item.kind,item.number,item.title,item.topic,item.tags,item.answerText].join(" "));
    item._tok = [...new Set(item._s.split(" ").filter(Boolean))];
  }
}
function queryGroups(v) {
  return normalize(v).split(" ").filter(Boolean).map(w => {
    const s = new Set([w, enToRu(w)]);
    if (/^[a-z]+$/i.test(w)) s.add(simpleTranslit(w));
    return [...s].filter(Boolean);
  });
}
function termMatch(item, term) {
  if (!term) return true;
  if (item._s.includes(term)) return true;
  const max = term.length<=2?0:term.length<=4?1:term.length<=7?2:3;
  for (const tok of item._tok) {
    if (Math.abs(tok.length-term.length)>max) continue;
    if (lev(term,tok)<=max) return true;
  }
  return false;
}
function lev(a,b) {
  if (a===b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  const p=Array.from({length:b.length+1},(_,i)=>i), c=new Array(b.length+1);
  for (let i=1;i<=a.length;i++) {
    c[0]=i;
    for (let j=1;j<=b.length;j++) c[j]=Math.min(c[j-1]+1,p[j]+1,p[j-1]+(a[i-1]===b[j-1]?0:1));
    for (let j=0;j<=b.length;j++) p[j]=c[j];
  }
  return p[b.length];
}
function filtered() {
  const g = queryGroups(queryEl.value);
  return catalog.filter(item => {
    if (state.mode==="questions" && item.kind!=="Вопрос") return false;
    if (state.mode==="tasks"     && item.kind!=="Задача") return false;
    return !g.length || g.every(gr => gr.some(t => termMatch(item,t)));
  });
}

/* ---- RENDER ---- */
function highlight(text, query) {
  const q = normalize(query).split(" ").filter(Boolean)[0];
  if (!q || q.length<3) return escHtml(text);
  const safe = escHtml(text);
  try { return safe.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi"), "<mark>$1</mark>"); }
  catch { return safe; }
}

function renderFilters() {
  filtersEl.innerHTML = "";
  for (const f of popularFilters) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "chip" + (
      (f.mode && f.mode===state.mode) ||
      (f.query && normalize(queryEl.value)===normalize(f.query)) ? " active" : ""
    );
    btn.textContent = f.label;
    btn.addEventListener("click", () => {
      if (f.mode) state.mode = f.mode;
      if (f.query) { queryEl.value = f.query; }
      render();
    });
    filtersEl.appendChild(btn);
  }
}

function renderList() {
  const items = filtered();
  listEl.innerHTML = "";
  emptyEl.style.display = items.length ? "none" : "block";
  const qC = catalog.filter(x=>x.kind==="Вопрос").length;
  const tC = catalog.filter(x=>x.kind==="Задача").length;
  counterEl.textContent = `${items.length} / ${catalog.length} · В:${qC} З:${tC}`;

  const frag = document.createDocumentFragment();
  for (const item of items) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "item";
    const label = item.kind==="Вопрос" ? String(item.number) : "З"+item.number;
    btn.innerHTML =
      `<div class="item-head"><span class="num">${label}</span><span>${highlight(item.title, queryEl.value)}</span></div>` +
      `<div class="item-meta">${escHtml(item.kind)} · ${escHtml(item.topic)}</div>`;
    btn.addEventListener("click", () => openModal(item));
    frag.appendChild(btn);
  }
  listEl.appendChild(frag);
}

function render() { renderFilters(); renderList(); }

/* ---- MODAL ---- */
function renderPhoto(src, label) {
  const clean = String(src||"").trim();
  if (!clean) return `<div class="photo-card"><div class="photo-empty-msg"><small>Фото не добавлено</small></div></div>`;
  return `<a class="photo-card has-photo" href="${escAttr(clean)}" target="_blank" rel="noopener">
    <img src="${escAttr(clean)}" alt="${escAttr(label)}" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="photo-error-msg"><small>Фото не найдено</small></span>
  </a>`;
}

function openModal(item) {
  const isPlaceholder = /^ВСТАВЬ СЮДА/i.test(String(item.answerText||"").trim());
  const photos = (Array.isArray(item.photos)?item.photos:[]).filter(p=>String(p||"").trim());

  modalTitle.textContent = `${item.kind} ${item.number}`;
  modalSubtitle.textContent = item.title;

  const photoHtml = photos.length
    ? `<div class="photo-grid">${photos.map((s,i)=>renderPhoto(s,`Фото ${i+1}`)).join("")}</div>`
    : "";

  const tagHtml = [item.topic, ...String(item.tags||"").split("|").filter(Boolean).map(t=>"#"+t)]
    .map(t=>`<span class="tag">${escHtml(t)}</span>`).join("");

  modalContent.innerHTML = `
    ${photoHtml}
    <div class="section-title">Тема</div>
    <div class="tags">${tagHtml}</div>
    <div class="section-title">Ответ / решение</div>
    <div class="answer${isPlaceholder?" placeholder":""}">${escHtml(item.answerText||"Текст не добавлен.")}</div>
    <div class="note">Чтобы добавить материалы: найди в коде <b>${escHtml(item.id)}</b> и заполни <b>answerText</b> и <b>photos</b>.</div>
  `;

  modalOverlay.style.display = "flex";
  document.body.style.overflow = "hidden";

  // Сброс скролла тела модалки
  modalContent.scrollTop = 0;
}

function closeModal() {
  modalOverlay.style.display = "none";
  document.body.style.overflow = "";
}

closeModalBtn.addEventListener("click", closeModal);
modalOverlay.addEventListener("click", e => { if (e.target===modalOverlay) closeModal(); });
document.addEventListener("keydown", e => { if (e.key==="Escape") closeModal(); });

/* ---- Свайп вниз для закрытия ---- */
(function() {
  const win = document.getElementById("modalWindow");
  let startY = 0, curY = 0, dragging = false;
  win.addEventListener("touchstart", e => {
    if (modalContent.scrollTop > 0) return;
    startY = e.touches[0].clientY;
    dragging = true;
  }, { passive: true });
  win.addEventListener("touchmove", e => {
    if (!dragging) return;
    curY = e.touches[0].clientY - startY;
    if (curY > 0) win.style.transform = `translateY(${curY}px)`;
  }, { passive: true });
  win.addEventListener("touchend", () => {
    if (!dragging) return;
    dragging = false;
    if (curY > 80) {
      closeModal();
    }
    win.style.transform = "";
    curY = 0;
  });
})();

/* ---- INPUT ---- */
let timer = null;
queryEl.addEventListener("input", () => { clearTimeout(timer); timer = setTimeout(render, 80); });
clearEl.addEventListener("click", () => { queryEl.value = ""; state.mode = "all"; queryEl.focus(); render(); });

/* ---- INIT ---- */
buildIndex();
render();
</script>
